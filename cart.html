<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Amira Aldahab Gold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

.header{
  padding:20px;
  background:#111;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
  color:gold;
  font-size:1.4rem;
  font-weight:700;
}

.container{
  padding:20px;
}

/* CART ITEM */
.cart-item{
  display:flex;
  gap:15px;
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  border:1px solid rgba(255,215,0,0.15);
}

.cart-item img{
  width:100px;
  height:100px;
  border-radius:10px;
  object-fit:cover;
}

.details h3{
  color:gold;
}

.price{
  margin-top:5px;
  font-weight:700;
}

.total{
  color:gold;
  margin-top:5px;
}

/* QUANTITY */
.qtyBox{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qtyBtn{
  width:35px;
  height:35px;
  border:none;
  background:gold;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

/* FORM */
.form{
  background:#111;
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(255,215,0,0.15);
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.whatsapp{
  background:#25D366;
  color:white;
}

.flutterwave{
  background:#ff9900;
  color:white;
}

.invoice{
  background:gold;
  color:black;
}

.submit{
  background:#2196F3;
  color:white;
}

.empty{
  text-align:center;
  opacity:0.7;
  margin-top:50px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🛒 Checkout - Amira Aldahab Gold</div>
</div>

<div class="container" id="cartBox"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cartItem"));
let quantity = 1;

const box = document.getElementById("cartBox");

function render(){

  if(!cart){
    box.innerHTML = "<div class='empty'>No item in cart</div>";
    return;
  }

  const total = cart.price * quantity;

  box.innerHTML = `

    <div class="cart-item">

      <img src="${cart.image}" />

      <div class="details">

        <h3>${cart.name}</h3>

        <div class="price">Price: $${cart.price}</div>

        <div class="total">
          Total: $<span id="total">${total}</span>
        </div>

        <!-- QUANTITY -->
        <div class="qtyBox">

          <button class="qtyBtn" onclick="changeQty(-1)">-</button>

          <span id="qty">${quantity}</span>

          <button class="qtyBtn" onclick="changeQty(1)">+</button>

        </div>

      </div>

    </div>

    <!-- DELIVERY FORM -->
    <div class="form">

      <h3 style="color:gold">Delivery Details</h3>

      <input id="fullname" placeholder="Full Name" />
      <input id="phone" placeholder="Phone Number" />
      <input id="address" placeholder="Delivery Address" />
      <textarea id="note" placeholder="Optional Note"></textarea>

      <button class="btn whatsapp" onclick="payWhatsApp()">
        Pay via WhatsApp Support
      </button>

      <button class="btn flutterwave" onclick="payFlutterwave()">
        Pay Now (Card / Bank Transfer)
      </button>

      <button class="btn invoice" onclick="generateInvoice()">
        Download Invoice (PDF Receipt)
      </button>

      <button class="btn submit" onclick="submitOrder()">
        I Have Paid / Submit Order
      </button>

    </div>

  `;
}

function changeQty(val){
  quantity += val;
  if(quantity < 1) quantity = 1;
  render();
}

/* WHATSAPP */
function payWhatsApp(){

  const name = document.getElementById("fullname").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill delivery details");
    return;
  }

  const total = cart.price * quantity;

  const msg =
  `Hello Amira Gold, I want to order:

Item: ${cart.name}
Price: $${cart.price}
Quantity: ${quantity}
Total: $${total}

Customer:
Name: ${name}
Phone: ${phone}
Address: ${address}`;

  window.open("https://wa.me/18622726355?text=" + encodeURIComponent(msg), "_blank");
}

/* FLUTTERWAVE */
function payFlutterwave(){

  const total = cart.price * quantity;

  const url =
  `https://checkout.flutterwave.com/v3/hosted/pay?amount=${total}&currency=USD`;

  window.location.href = url;
}

/* INVOICE */
function generateInvoice(){

  const name = document.getElementById("fullname").value || "N/A";
  const phone = document.getElementById("phone").value || "N/A";
  const address = document.getElementById("address").value || "N/A";

  const total = cart.price * quantity;
  const invoiceId = "INV-" + Math.floor(Math.random() * 99999999);
  const date = new Date().toLocaleString();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("Amira Aldahab Gold Invoice", 20, 20);

  doc.setFontSize(12);
  doc.text("Invoice ID: " + invoiceId, 20, 35);
  doc.text("Date: " + date, 20, 45);

  doc.text("Customer:", 20, 60);
  doc.text("Name: " + name, 20, 70);
  doc.text("Phone: " + phone, 20, 80);
  doc.text("Address: " + address, 20, 90);

  doc.text("Order:", 20, 110);
  doc.text("Product: " + cart.name, 20, 120);
  doc.text("Price: $" + cart.price, 20, 130);
  doc.text("Quantity: " + quantity, 20, 140);
  doc.text("Total: $" + total, 20, 150);

  doc.text("Thank you for your purchase!", 20, 170);

  doc.save(invoiceId + ".pdf");
}

/* SUBMIT ORDER */
function submitOrder(){

  const name = document.getElementById("fullname").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill delivery details before submitting order");
    return;
  }

  const order = {
    product: cart.name,
    price: cart.price,
    quantity: quantity,
    total: cart.price * quantity,
    customer: {
      name,
      phone,
      address
    },
    status: "Under Review",
    date: new Date().toISOString()
  };

  localStorage.setItem("lastOrder", JSON.stringify(order));
  localStorage.removeItem("cartItem");

  window.location.href = "order-success.html";
}

render();

</script>

</body>
</html>
