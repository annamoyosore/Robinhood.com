<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart - Amira Aldahab Gold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

.header{
  padding:20px;
  background:#111;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
  color:gold;
  font-size:1.4rem;
  font-weight:700;
}

.container{
  padding:20px;
}

.cart-item{
  display:flex;
  gap:15px;
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  border:1px solid rgba(255,215,0,0.15);
}

.cart-item img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

.details{
  flex:1;
}

.details h3{
  color:gold;
}

.price{
  margin-top:5px;
  font-weight:700;
}

.total{
  color:gold;
  margin-top:5px;
  font-weight:700;
}

.qtyBox{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qtyBtn{
  width:35px;
  height:35px;
  background:gold;
  color:black;
  border:none;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

.form{
  background:#111;
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(255,215,0,0.15);
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  outline:none;
  background:#222;
  color:white;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.whatsapp{
  background:#25D366;
  color:white;
}

.flutterwave{
  background:#ff9900;
  color:white;
}

.invoice{
  background:gold;
  color:black;
}

.submit{
  background:#2196F3;
  color:white;
}

.empty{
  text-align:center;
  margin-top:50px;
  opacity:0.7;
}

.loading{
  opacity:0.7;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🛒 Cart - Amira Aldahab Gold</div>
</div>

<div class="container" id="cartBox"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cartItem"));
let quantity = 1;

const box = document.getElementById("cartBox");

function render(){

  if(!cart){
    box.innerHTML = `
      <div class="empty">
        Cart is empty
      </div>
    `;
    return;
  }

  const total = cart.price * quantity;

  box.innerHTML = `

    <div class="cart-item">

      <img src="${cart.image}" alt="product">

      <div class="details">

        <h3>${cart.name}</h3>

        <div class="price">
          Price: $${cart.price}
        </div>

        <div class="total">
          Total: $${total}
        </div>

        <div class="qtyBox">

          <button class="qtyBtn"
            onclick="changeQty(-1)">
            -
          </button>

          <span>${quantity}</span>

          <button class="qtyBtn"
            onclick="changeQty(1)">
            +
          </button>

        </div>

      </div>

    </div>

    <div class="form">

      <h3 style="color:gold">
        Delivery Details
      </h3>

      <input
        id="fullname"
        placeholder="Full Name"
      />

      <input
        id="phone"
        placeholder="Phone Number"
      />

      <input
        id="address"
        placeholder="Delivery Address"
      />

      <textarea
        id="note"
        placeholder="Optional Note">
      </textarea>

      <button
        class="btn whatsapp"
        onclick="payWhatsApp()">
        WhatsApp Pay
      </button>

      <button
        class="btn flutterwave"
        onclick="payFlutterwave()">
        Pay Directly Now
      </button>

      <button
        class="btn invoice"
        onclick="generateInvoice()">
        Download Invoice
      </button>

      <button
        id="submitBtn"
        class="btn submit"
        onclick="submitOrder()">
        I Have Paid / Submit Order
      </button>

    </div>

  `;
}

function changeQty(val){

  quantity += val;

  if(quantity < 1){
    quantity = 1;
  }

  render();
}

/* WHATSAPP PAYMENT */
function payWhatsApp(){

  const name =
    document.getElementById("fullname").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const address =
    document.getElementById("address").value.trim();

  if(!name || !phone || !address){
    alert("Fill delivery details");
    return;
  }

  const total = cart.price * quantity;

  const msg = `
🛒 Order Request

Product: ${cart.name}
Quantity: ${quantity}
Total: $${total}

Customer:
Name: ${name}
Phone: ${phone}
Address: ${address}
`;

  window.open(
    "https://wa.me/18622726355?text=" +
    encodeURIComponent(msg),
    "_blank"
  );
}

/* FLUTTERWAVE PAYMENT */
function payFlutterwave(){

  const name =
    document.getElementById("fullname").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const address =
    document.getElementById("address").value.trim();

  if(!name || !phone || !address){
    alert("Fill delivery details");
    return;
  }

  const total = cart.price * quantity;

  // REPLACE WITH YOUR REAL LINK
  const paymentLink =
    "https://checkout.flutterwave.com/v3/hosted/pay";

  const params = new URLSearchParams({
    tx_ref: "AMIRA_" + Date.now(),
    amount: total,
    currency: "USD",
    redirect_url:
    "https://amirajweriesstore.vercel.app/order-success.html",

    customer_email: "customer@email.com",
    customer_name: name,
    customer_phone_number: phone,

    custom_title: "Amira Aldahab Gold",
    custom_description: cart.name
  });

  window.open(
    paymentLink + "?" + params.toString(),
    "_blank"
  );
}

/* PDF INVOICE */
function generateInvoice(){

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  const total = cart.price * quantity;

  doc.setFontSize(18);
  doc.text("Amira Aldahab Gold Invoice", 20, 20);

  doc.setFontSize(12);

  doc.text("Product: " + cart.name, 20, 40);
  doc.text("Price: $" + cart.price, 20, 50);
  doc.text("Quantity: " + quantity, 20, 60);
  doc.text("Total: $" + total, 20, 70);

  doc.text(
    "Generated: " +
    new Date().toLocaleString(),
    20,
    90
  );

  doc.save("invoice.pdf");
}

/* SUBMIT ORDER */
async function submitOrder(){

  const btn =
    document.getElementById("submitBtn");

  const name =
    document.getElementById("fullname").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const address =
    document.getElementById("address").value.trim();

  const note =
    document.getElementById("note").value.trim();

  if(!name || !phone || !address){
    alert("Fill all delivery details");
    return;
  }

  if(!cart){
    alert("Cart is empty");
    return;
  }

  btn.innerText = "Submitting...";
  btn.classList.add("loading");

  const order = {

    product: cart.name,

    image: cart.image,

    price: cart.price,

    quantity: quantity,

    total: cart.price * quantity,

    customer: {
      name,
      phone,
      address,
      note
    },

    status: "Under Review",

    date: new Date().toISOString()
  };

  try {

    const res = await fetch("/api/send-order", {

      method: "POST",

      headers: {
        "Content-Type":"application/json"
      },

      body: JSON.stringify(order)

    });

    const text = await res.text();

    let data;

    try{
      data = JSON.parse(text);
    }catch{

      console.log(text);

      alert("Invalid server response");

      btn.innerText =
      "I Have Paid / Submit Order";

      btn.classList.remove("loading");

      return;
    }

    if(data.success){

      localStorage.setItem(
        "lastOrder",
        JSON.stringify(order)
      );

      localStorage.removeItem("cartItem");

      alert("Order submitted successfully");

      window.location.href =
        "order-success.html";

    } else {

      alert(
        data.message ||
        "Order submission failed"
      );

    }

  } catch(err){

    console.error(err);

    alert(
      "Failed to connect to server"
    );

  }

  btn.innerText =
    "I Have Paid / Submit Order";

  btn.classList.remove("loading");
}

render();

</script>

</body>
</html>
