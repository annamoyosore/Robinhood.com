<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart - Amira Aldahab Gold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  background:#111;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
  color:gold;
  font-size:1.5rem;
  font-weight:700;
}

/* CART CONTAINER */
.container{
  padding:20px;
}

/* ITEM CARD */
.cart-item{
  display:flex;
  gap:15px;
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  border:1px solid rgba(255,215,0,0.15);
}

.cart-item img{
  width:100px;
  height:100px;
  border-radius:10px;
  object-fit:cover;
}

.details{
  flex:1;
}

.details h3{
  color:gold;
}

.price{
  margin:5px 0;
}

/* QTY */
.qty{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qty button{
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
  background:gold;
}

.remove{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

/* SUMMARY */
.summary{
  background:#111;
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(255,215,0,0.15);
}

.total{
  font-size:1.2rem;
  font-weight:700;
  color:gold;
  margin-bottom:10px;
}

.checkout{
  width:100%;
  padding:12px;
  background:gold;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.empty{
  text-align:center;
  opacity:0.7;
  margin-top:50px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🛒 Cart - Amira Aldahab Gold</div>
</div>

<div class="container" id="cartContainer"></div>

<div class="container">

  <div class="summary">
    <div class="total">Total: $<span id="total">0</span></div>
    <button class="checkout" onclick="checkout()">Checkout via WhatsApp</button>
  </div>

</div>

<script>

// GET ITEM FROM DASHBOARD
let cart = JSON.parse(localStorage.getItem("cartItem"));

const container = document.getElementById("cartContainer");
let quantity = 1;

function render(){

  if(!cart){
    container.innerHTML = "<div class='empty'>No items in cart</div>";
    return;
  }

  container.innerHTML = `
    <div class="cart-item">

      <img src="${cart.image}" />

      <div class="details">

        <h3>${cart.name}</h3>

        <div class="price">Price: $${cart.price}</div>

        <div class="qty">
          <button onclick="changeQty(-1)">-</button>
          <span id="qty">${quantity}</span>
          <button onclick="changeQty(1)">+</button>
        </div>

        <button class="remove" onclick="removeItem()">Remove</button>

      </div>

    </div>
  `;

  updateTotal();
}

function changeQty(val){
  quantity += val;
  if(quantity < 1) quantity = 1;
  document.getElementById("qty").innerText = quantity;
  updateTotal();
}

function updateTotal(){
  if(!cart) return;
  document.getElementById("total").innerText = cart.price * quantity;
}

function removeItem(){
  localStorage.removeItem("cartItem");
  cart = null;
  render();
  updateTotal();
}

function checkout(){

  if(!cart){
    alert("Cart is empty");
    return;
  }

  const message =
  `Hello Amira Gold, I want to order:

Item: ${cart.name}
Price: $${cart.price}
Quantity: ${quantity}
Total: $${cart.price * quantity}`;

  const url =
  "https://wa.me/18622726355?text=" +
  encodeURIComponent(message);

  window.open(url, "_blank");
}

render();

</script>

</body>
</html>
