<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart - Amira Aldahab Gold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

.header{
  padding:20px;
  background:#111;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.logo{
  color:gold;
  font-size:1.4rem;
  font-weight:700;
}

.container{
  padding:20px;
}

.cart-item{
  display:flex;
  gap:15px;
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  border:1px solid rgba(255,215,0,0.15);
}

.cart-item img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

.details h3{
  color:gold;
}

.price{
  margin-top:5px;
  font-weight:700;
}

.total{
  color:gold;
  margin-top:5px;
}

.qtyBox{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qtyBtn{
  width:35px;
  height:35px;
  background:gold;
  border:none;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

.form{
  background:#111;
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(255,215,0,0.15);
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.whatsapp{background:#25D366;color:white;}
.flutterwave{background:#ff9900;color:white;}
.invoice{background:gold;color:black;}
.submit{background:#2196F3;color:white;}

.empty{
  text-align:center;
  margin-top:50px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🛒 Cart - Amira Aldahab Gold</div>
</div>

<div class="container" id="cartBox"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cartItem"));
let quantity = 1;

const box = document.getElementById("cartBox");

function render(){

  if(!cart){
    box.innerHTML = "<div class='empty'>Cart is empty</div>";
    return;
  }

  const total = cart.price * quantity;

  box.innerHTML = `

    <div class="cart-item">

      <img src="${cart.image}" />

      <div class="details">

        <h3>${cart.name}</h3>

        <div class="price">Price: $${cart.price}</div>

        <div class="total">Total: $${total}</div>

        <div class="qtyBox">

          <button class="qtyBtn" onclick="changeQty(-1)">-</button>
          <span>${quantity}</span>
          <button class="qtyBtn" onclick="changeQty(1)">+</button>

        </div>

      </div>

    </div>

    <div class="form">

      <h3 style="color:gold">Delivery Details</h3>

      <input id="fullname" placeholder="Full Name" />
      <input id="phone" placeholder="Phone Number" />
      <input id="address" placeholder="Delivery Address" />
      <textarea id="note" placeholder="Optional Note"></textarea>

      <button class="btn whatsapp" onclick="payWhatsApp()">WhatsApp Pay</button>
      <button class="btn flutterwave" onclick="payFlutterwave()">Pay Now</button>
      <button class="btn invoice" onclick="generateInvoice()">Download Invoice</button>

      <button class="btn submit" onclick="submitOrder()">
        I Have Paid / Submit Order
      </button>

    </div>

  `;
}

function changeQty(val){
  quantity += val;
  if(quantity < 1) quantity = 1;
  render();
}

/* WHATSAPP */
function payWhatsApp(){

  const name = document.getElementById("fullname").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill delivery details");
    return;
  }

  const total = cart.price * quantity;

  const msg = `
Order:
${cart.name}
Qty: ${quantity}
Total: $${total}
Name: ${name}
Phone: ${phone}
Address: ${address}
`;

  window.open("https://wa.me/+18622726355?text=" + encodeURIComponent(msg));
}

/* FLUTTERWAVE */
function payFlutterwave(){
  const total = cart.price * quantity;
  window.location.href =
  `https://flutterwave.com/pay/kqsgvbl9spjm/v3/hosted/pay?amount=${total}&currency=USD`;
}

/* INVOICE */
function generateInvoice(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const total = cart.price * quantity;

  doc.text("Amira Aldahab Gold Invoice", 20, 20);
  doc.text("Product: " + cart.name, 20, 40);
  doc.text("Qty: " + quantity, 20, 50);
  doc.text("Total: $" + total, 20, 60);

  doc.save("invoice.pdf");
}

/* SUBMIT ORDER → TELEGRAM */
async function submitOrder(){

  const name = document.getElementById("fullname").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all details");
    return;
  }

  const order = {
    product: cart.name,
    price: cart.price,
    quantity,
    total: cart.price * quantity,
    customer: { name, phone, address },
    date: new Date().toISOString()
  };

  try {

    const res = await fetch("https://amirajweriesstore.vercel.app/api/send-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(order)
    });

    const data = await res.json();

    if(data.success){

      localStorage.setItem("lastOrder", JSON.stringify({
        ...order,
        status: "Under Review"
      }));

      localStorage.removeItem("cartItem");

      window.location.href = "order-success.html";

    } else {
      alert("Order failed");
    }

  } catch (err) {
    alert("Failed to load server");
  }
}

render();

</script>

</body>
</html>
