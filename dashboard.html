<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amira Aldahab Gold</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  background:#111;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  color:gold;
  font-size:1.6rem;
  font-weight:700;
}

.wallet{
  background:gold;
  color:black;
  padding:10px 16px;
  border-radius:12px;
  font-weight:700;
}

/* LANGUAGE */
#langSelect{
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  background:#222;
  color:white;
  border:none;
}

/* BUTTONS */
.top-buttons{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.top-buttons button{
  background:#2196F3;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:20px;
  text-align:center;
}

.hero h1{
  color:gold;
}

.hero p{
  opacity:0.8;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,215,0,0.15);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.card h3{
  color:gold;
}

.price{
  margin:8px 0;
  font-weight:700;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.buy{
  background:gold;
}

/* SUPPORT */
.support{
  padding:20px;
  text-align:center;
}

.support h2{
  color:gold;
}

.support p{
  opacity:0.8;
  margin-bottom:10px;
}

.support button{
  margin-top:10px;
}

/* EXTRA BUTTONS */
.more{
  background:#2196F3;
  color:white;
  margin:10px 20px;
}

.zangi{
  background:#ffb300;
  margin:10px 20px;
}

.signup{
  background:#25D366;
  color:white;
  margin:10px 20px;
}

.logout{
  background:red;
  color:white;
  margin:20px;
  width:calc(100% - 40px);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="top-row">
    <div class="logo">Amira Aldahab Gold</div>
    <div class="wallet">Wallet: $<span id="balance">0</span></div>
  </div>

  <!-- LANGUAGE -->
  <select id="langSelect" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="ar">Arabic</option>
    <option value="zh">Chinese</option>
    <option value="es">Spanish</option>
    <option value="id">Indonesia</option>
    <option value="ph">Philippines</option>
    <option value="kw">Kuwait</option>
    <option value="fr">French</option>
  </select>

  <!-- ABOUT + TESTIMONIES -->
  <div class="top-buttons">
    <button onclick="openAbout()">About</button>
    <button onclick="openTestimonies()">Testimonies</button>
  </div>

</div>

<!-- HERO -->
<div class="hero">
  <h1 data-i18n="title">Luxury Gold Marketplace</h1>
  <p data-i18n="subtitle">Premium Arabian Gold Jewelry Collection</p>
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
    <div class="card-content">
      <h3>Gold Necklace</h3>
      <div class="price">$120</div>
      <button class="buy" onclick="buyNow('Gold Necklace',120,'https://images.unsplash.com/photo-1611652022419-a9419f74343d')">
        Buy
      </button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1629224316810-9d8805b95e76">
    <div class="card-content">
      <h3>Gold Chain</h3>
      <div class="price">$95</div>
      <button class="buy" onclick="buyNow('Gold Chain',95,'https://images.unsplash.com/photo-1629224316810-9d8805b95e76')">
        Buy
      </button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e">
    <div class="card-content">
      <h3>Wedding Ring</h3>
      <div class="price">$150</div>
      <button class="buy" onclick="buyNow('Wedding Ring',150,'https://images.unsplash.com/photo-1605100804763-247f67b3557e')">
        Buy
      </button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1619119069152-a2b331eb392a">
    <div class="card-content">
      <h3>Gold Bracelet</h3>
      <div class="price">$110</div>
      <button class="buy" onclick="buyNow('Gold Bracelet',110,'https://images.unsplash.com/photo-1619119069152-a2b331eb392a')">
        Buy
      </button>
    </div>
  </div>

</div>

<!-- SUPPORT -->
<div class="support">

  <h2 data-i18n="support_title">Can't find your desired product?</h2>
  <p data-i18n="support_text">Contact us for custom gold orders</p>

</div>

<!-- EXTRA -->
<button class="more" onclick="moreItems()">Check More Items</button>
<button class="zangi" onclick="openZangi()">Zangi</button>
<button class="signup" onclick="goSignup()">Sign Up if you have none</button>

<!-- LOGOUT -->
<button class="logout" onclick="logout()">Logout</button>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>

<script>

// APPWRITE
const client = new Appwrite.Client();
client.setEndpoint("https://nyc.cloud.appwrite.io/v1")
.setProject("696f9104001dfedc5e1a");

const account = new Appwrite.Account(client);
const databases = new Appwrite.Databases(client);

const DATABASE_ID = "6970722d00269d80304f";
const WALLET = "wallet";

// WALLET
async function loadWallet(){
  try{
    const user = await account.get();
    const res = await databases.listDocuments(DATABASE_ID, WALLET);
    const w = res.documents.find(d => d.userId === user.$id);
    if(w) document.getElementById("balance").innerText = w.balance;
  }catch{
    window.location.href="auth.html";
  }
}
loadWallet();

// BUY → SEND FULL ITEM DATA TO CART
function buyNow(name, price, image){

  localStorage.setItem("cartItem", JSON.stringify({
    name,
    price,
    image
  }));

  window.location.href = "cart.html";
}

// ABOUT
function openAbout(){
  alert("Amira Aldahab Gold is a premium luxury gold marketplace.");
}

// TESTIMONIES
function openTestimonies(){
  alert("⭐⭐⭐⭐⭐ Excellent quality\n⭐⭐⭐⭐⭐ Trusted seller\n⭐⭐⭐⭐⭐ Fast delivery");
}

// MORE ITEMS
function moreItems(){
  alert("More collections coming soon.");
}

// ZANGI
function openZangi(){
  window.open("https://zangi.com","_blank");
}

// SIGNUP
function goSignup(){
  window.location.href="auth.html";
}

// LOGOUT
async function logout(){
  try{ await account.deleteSession("current"); }catch{}
  window.location.href="auth.html";
}

// LANGUAGE
const translations = {
  en:{title:"Luxury Gold Marketplace",subtitle:"Premium Arabian Gold Jewelry Collection",support_title:"Can't find your desired product?",support_text:"Contact us for custom gold orders"},
  ar:{title:"سوق الذهب الفاخر",subtitle:"مجوهرات عربية فاخرة",support_title:"لم تجد المنتج؟",support_text:"تواصل معنا"},
  zh:{title:"黄金市场",subtitle:"高级珠宝",support_title:"找不到产品？",support_text:"联系我们"},
  es:{title:"Mercado de Oro",subtitle:"Joyería premium",support_title:"¿No encuentras?",support_text:"Contáctanos"},
  id:{title:"Pasar Emas",subtitle:"Perhiasan premium",support_title:"Tidak menemukan?",support_text:"Hubungi kami"},
  ph:{title:"Gold Market",subtitle:"Premium jewelry",support_title:"Walang nakita?",support_text:"Contact us"},
  kw:{title:"سوق الذهب",subtitle:"مجوهرات فاخرة",support_title:"لم تجد؟",support_text:"اتصل بنا"},
  fr:{title:"Marché de l'or",subtitle:"Bijoux premium",support_title:"Produit introuvable?",support_text:"Contactez-nous"}
};

function changeLanguage(){
  const lang=document.getElementById("langSelect").value;
  const t=translations[lang];

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.innerText=t[el.dataset.i18n];
  });
}

</script>

</body>
</html>
