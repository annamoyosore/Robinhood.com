<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amira Aldahab Gold Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0d0d0d;
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  background:#111;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  color:gold;
  font-size:1.6rem;
  font-weight:700;
}

.wallet{
  background:gold;
  color:black;
  padding:10px 16px;
  border-radius:12px;
  font-weight:700;
  margin-top:5px;
}

#langSelect{
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}

/* BUTTONS */
.top-buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.top-buttons button{
  background:#2196F3;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

/* HERO */
.hero{
  padding:25px;
  text-align:center;
}

.hero h1{
  color:gold;
  margin-bottom:10px;
}

.hero p{
  opacity:0.8;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#111;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,215,0,0.15);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card h3{
  color:gold;
  margin-bottom:8px;
}

.price{
  font-weight:700;
  margin-bottom:10px;
}

.buy-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:gold;
  font-weight:700;
  cursor:pointer;
}

/* SUPPORT */
.support{
  padding:20px;
  text-align:center;
}

.support h2{
  color:gold;
}

.support p{
  opacity:0.8;
  margin-bottom:15px;
}

.support button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.whatsapp{
  background:#25D366;
  color:white;
}

.zangi{
  background:#ffb300;
  color:black;
}

/* LOGOUT */
.logout{
  margin:20px;
  width:calc(100% - 40px);
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff4444;
  color:white;
  font-weight:700;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="top-row">

    <div class="logo">Amira Aldahab Gold</div>

    <div class="wallet">
      Wallet: $<span id="balance">0</span>
    </div>

  </div>

  <!-- LANGUAGE -->
  <select id="langSelect" onchange="changeLanguage()">
    <option value="en">English</option>
    <option value="ar">Arabic</option>
    <option value="zh">Chinese</option>
    <option value="es">Spanish</option>
    <option value="id">Indonesia</option>
    <option value="ph">Philippines</option>
    <option value="kw">Kuwait</option>
    <option value="fr">French</option>
  </select>

  <!-- BUTTONS -->
  <div class="top-buttons">
    <button onclick="openAbout()">About</button>
    <button onclick="openTestimonies()">Testimonies</button>
  </div>

</div>

<!-- HERO -->
<div class="hero">

  <h1 data-i18n="title">Luxury Gold Marketplace</h1>
  <p data-i18n="subtitle">Explore premium Arabian gold jewelry collections</p>

</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d?q=80&w=1200">
    <div class="card-content">
      <h3>Gold Necklace</h3>
      <div class="price">$120</div>
      <button class="buy-btn" onclick="buyNow('Gold Necklace',120,'img1')">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1629224316810-9d8805b95e76?q=80&w=1200">
    <div class="card-content">
      <h3>Gold Chain</h3>
      <div class="price">$95</div>
      <button class="buy-btn" onclick="buyNow('Gold Chain',95,'img2')">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=1200">
    <div class="card-content">
      <h3>Wedding Ring</h3>
      <div class="price">$150</div>
      <button class="buy-btn" onclick="buyNow('Wedding Ring',150,'img3')">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1619119069152-a2b331eb392a?q=80&w=1200">
    <div class="card-content">
      <h3>Gold Bracelet</h3>
      <div class="price">$110</div>
      <button class="buy-btn" onclick="buyNow('Gold Bracelet',110,'img4')">Buy Now</button>
    </div>
  </div>

</div>

<!-- SUPPORT -->
<div class="support">

  <h2 data-i18n="support_title">Can't find your desired gold product?</h2>

  <p data-i18n="support_text">Contact Amira Aldahab Gold directly for custom orders.</p>

  <button class="whatsapp" onclick="openWhatsApp()">WhatsApp</button>
  <button class="zangi" onclick="openZangi()">Zangi</button>

</div>

<!-- LOGOUT -->
<button class="logout" onclick="logout()">Logout</button>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>

<script>

// APPWRITE
const client = new Appwrite.Client();
client.setEndpoint("https://nyc.cloud.appwrite.io/v1")
.setProject("696f9104001dfedc5e1a");

const account = new Appwrite.Account(client);
const databases = new Appwrite.Databases(client);

const DATABASE_ID = "6970722d00269d80304f";
const WALLET = "wallet";

// LOAD WALLET
async function loadWallet(){
  try{
    const user = await account.get();
    const res = await databases.listDocuments(DATABASE_ID, WALLET);
    const w = res.documents.find(d => d.userId === user.$id);
    if(w) document.getElementById("balance").innerText = w.balance;
  }catch{
    window.location.href="auth.html";
  }
}
loadWallet();

// BUY
function buyNow(name, price, img){
  localStorage.setItem("cartItem", JSON.stringify({name,price,img}));
  window.location.href="cart.html";
}

// ABOUT
function openAbout(){
  alert("Amira Aldahab Gold - Premium Arabian Jewelry Marketplace");
}

// TESTIMONIES
function openTestimonies(){
  alert("⭐⭐⭐⭐⭐ Great quality gold!\n⭐⭐⭐⭐⭐ Fast delivery!\n⭐⭐⭐⭐⭐ Trusted shop!");
}

// WHATSAPP
function openWhatsApp(){
  window.open("https://wa.me/18622726355","_blank");
}

// ZANGI
function openZangi(){
  window.open("https://zangi.com","_blank");
}

// LOGOUT
async function logout(){
  try{ await account.deleteSession("current"); }catch{}
  window.location.href="auth.html";
}

// LANGUAGE
const translations = {
  en:{title:"Luxury Gold Marketplace",subtitle:"Explore premium Arabian gold jewelry collections",support_title:"Can't find your desired gold product?",support_text:"Contact Amira Gold for custom orders"},
  ar:{title:"سوق الذهب الفاخر",subtitle:"استكشف المجوهرات العربية",support_title:"لم تجد المنتج؟",support_text:"تواصل معنا"},
  zh:{title:"奢华黄金市场",subtitle:"探索黄金珠宝",support_title:"找不到产品？",support_text:"联系我们"},
  es:{title:"Mercado de Oro",subtitle:"Explora joyas premium",support_title:"¿No encuentras?",support_text:"Contáctanos"},
  id:{title:"Pasar Emas",subtitle:"Koleksi emas premium",support_title:"Tidak menemukan?",support_text:"Hubungi kami"},
  ph:{title:"Gold Market",subtitle:"Premium gold jewelry",support_title:"Walang produkto?",support_text:"Contact us"},
  kw:{title:"سوق الذهب",subtitle:"مجوهرات فاخرة",support_title:"لا يوجد المنتج؟",support_text:"اتصل بنا"},
  fr:{title:"Marché de l'or",subtitle:"Bijoux premium",support_title:"Produit introuvable?",support_text:"Contactez-nous"}
};

function changeLanguage(){
  const lang=document.getElementById("langSelect").value;
  const t=translations[lang];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.innerText=t[el.dataset.i18n];
  });
}

</script>

</body>
</html>
